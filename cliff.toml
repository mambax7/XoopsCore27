# git-cliff configuration for XoopsCore27
#
# The root CHANGELOG.md is GENERATED from the conventional-commit history
# by git-cliff and MUST NOT be edited by hand — it is overwritten on every
# run. CI regenerates it automatically on each published release
# (.github/workflows/changelog.yml); you can also dispatch that workflow
# manually, or run it locally if git-cliff is installed:
#
#     git cliff --output CHANGELOG.md
#
# The curated, human-written narrative release notes remain authoritative
# in docs/changelog.270.txt (and language changes in docs/lang_diff.txt).
# This config only drives the machine-generated top-level CHANGELOG.md.

[changelog]
header = """
# Changelog

All notable changes to XOOPS Core. This file is generated from the commit
history by git-cliff — **do not edit it by hand**. For curated, narrative
release notes see [`docs/changelog.270.txt`](docs/changelog.270.txt) and
[`docs/lang_diff.txt`](docs/lang_diff.txt).

"""
body = """
{% if version %}\
## [{{ version }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits %}\
- {{ commit.message | split(pat="\n") | first | trim | upper_first }}
{% endfor %}\
{% endfor %}

"""
footer = """
<!-- generated by git-cliff; regenerate, do not hand-edit -->
"""
trim = true

[git]
conventional_commits = true
# Keep non-conventional history visible rather than silently dropping it.
filter_unconventional = false
split_commits = false
# Drop noise that does not belong in a user-facing changelog.
commit_preprocessors = [
  { pattern = '\s*\(#(\d+)\)', replace = " (#${1})" },
]
commit_parsers = [
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Bug Fixes" },
  { message = "^security", group = "Security" },
  { message = "^compat", group = "Compatibility" },
  { message = "^perf", group = "Performance" },
  { message = "^refactor", group = "Refactor" },
  { message = "^docs", group = "Documentation" },
  { message = "^test", group = "Testing" },
  { message = "^style", group = "Styling" },
  { message = "^chore\\(deps\\)", skip = true },
  { message = "^chore\\(release\\)", skip = true },
  { message = "^(chore|ci|build)", group = "Miscellaneous" },
  { message = ".*", group = "Other" },
]
protect_breaking_commits = false
filter_commits = false
# SemVer-style release tags (e.g. 2.7.0, 2.7.0-RC1). No "v" prefix here.
tag_pattern = "[0-9]+\\.[0-9]+\\.[0-9]+.*"
skip_tags = ""
ignore_tags = ""
topo_order = false
sort_commits = "newest"
